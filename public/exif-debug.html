<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>EXIF 自动验证</title>
<style>
  body { font-family: monospace; background: #09090b; color: #e4e4e7; padding: 20px; }
  .pass { color: #22c55e; font-weight: bold; }
  .fail { color: #ef4444; font-weight: bold; }
  pre { background: #0f0f13; padding: 12px; border-radius: 6px; font-size: 12px; }
</style>
</head>
<body>
<h2>EXIF 自动验证</h2>
<pre id="log">Starting...</pre>

<script type="importmap">
{ "imports": { "exifr": "https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.esm.mjs" } }
</script>
<script type="module">
import exifr from 'exifr';

function toDecimal(dms) {
  if (typeof dms === 'number') return dms;
  if (Array.isArray(dms) && dms.length === 3) return dms[0] + dms[1]/60 + dms[2]/3600;
  return null;
}
function parseExifDate(raw) {
  if (!raw) return null;
  if (raw instanceof Date) return isNaN(raw.getTime()) ? null : raw;
  if (typeof raw !== 'string') return null;
  var iso = raw.replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1-$2-$3');
  var d = new Date(iso);
  return isNaN(d.getTime()) ? null : d;
}

var log = document.getElementById('log');
function L(s, cls) { log.innerHTML += '\n' + (cls ? '<span class="'+cls+'">'+s+'</span>' : s); }

async function main() {
  L('Fetching test-date.jpg from server...');
  var resp = await fetch('/test-date.jpg');
  var buf = await resp.arrayBuffer();
  L('Got ' + buf.byteLength + ' bytes');

  var data = await exifr.parse(buf, {
    gps: true, tiff: true, exif: true,
    translateKeys: true, translateValues: false
  });

  L('--- Raw EXIF ---');
  L(JSON.stringify(data, null, 2));

  // Test 1: date key casing
  L('');
  L('--- Date Key Tests ---');
  var dtCap = data.DateTimeOriginal;
  var dtLow = data.dateTimeOriginal;
  L('data.DateTimeOriginal (Capital D): ' + (dtCap ? '"' + dtCap + '"' : 'UNDEFINED'), dtCap ? 'pass' : 'fail');
  L('data.dateTimeOriginal (lower d): ' + (dtLow ? '"' + dtLow + '"' : 'UNDEFINED'), dtLow ? 'pass' : 'fail');

  // Test 2: parse date with our function
  L('');
  L('--- Date Parse Tests ---');
  var d1 = parseExifDate(dtCap);
  var d2 = parseExifDate(dtLow);
  L('parseExifDate(DateTimeOriginal): ' + (d1 ? d1.toLocaleString() : 'NULL'), d1 ? 'pass' : 'fail');
  L('parseExifDate(dateTimeOriginal): ' + (d2 ? d2.toLocaleString() : 'NULL'), d2 ? 'pass' : 'fail');

  // Test 3: final datetime resolution (matching exifParser.js logic)
  L('');
  L('--- Final Resolution (matching exifParser.js) ---');
  var datetime = parseExifDate(data.DateTimeOriginal)
              || parseExifDate(data.dateTimeOriginal)
              || parseExifDate(data.CreateDate)
              || parseExifDate(data.createDate)
              || parseExifDate(data.ModifyDate)
              || parseExifDate(data.modifyDate)
              || null;
  L('Resolved datetime: ' + (datetime ? datetime.toLocaleString() : 'NULL'), datetime ? 'pass' : 'fail');

  // Test 4: GPS
  L('');
  L('--- GPS Tests ---');
  var lat = null, lng = null;
  if (data.latitude != null && data.longitude != null) {
    lat = toDecimal(data.latitude);
    lng = toDecimal(data.longitude);
  }
  if (lat != null) {
    if (data.gpsLatitudeRef === 'S' || data.GPSLatitudeRef === 'S') lat = -lat;
    if (data.gpsLongitudeRef === 'W' || data.GPSLongitudeRef === 'W') lng = -lng;
  }
  L('lat: ' + lat + ' lng: ' + lng, (lat != null && lng != null) ? 'pass' : 'fail');

  // Summary
  L('');
  L('========================================');
  if (datetime && lat != null) {
    L('ALL CHECKS PASSED', 'pass');
  } else {
    L('SOME CHECKS FAILED', 'fail');
  }
}

main().catch(function(e) { L('ERROR: ' + e.message, 'fail'); L(e.stack || ''); });
</script>
</body>
</html>
